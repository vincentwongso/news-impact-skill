# Copy to config.yaml and edit. API keys come from environment variables only.
watchlist:
  - EURUSD
  - XAUUSD
  - GBPUSD

# Local Ollama (default) — free, no key. Run `ollama pull llama3.1:8b` and keep
# `ollama serve` running. Paid alternatives: deepseek-v4-flash (OpenAI-compatible,
# cheap+good) | haiku (Anthropic) | openai:<model>
model: ollama:llama3.1:8b

lookback_hours: 4
min_severity: medium        # low | medium | high

sources:
  yahoo:   { enabled: true }
  x:       { enabled: false, accounts: ["@..."] }          # stub (paid API)
  finnhub: { enabled: false, api_key_env: FINNHUB_KEY }    # stub

aliases:
  EUR: [Lagarde, ECB, euro, eurozone]
  USD: [Powell, Fed, FOMC, CPI, NFP]
  XAU: [gold, bullion, XAU]
  GBP: [BoE, Bailey, sterling, pound]
